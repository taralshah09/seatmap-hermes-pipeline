<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.stage{width:320px;height:42px;background:#1f6feb;color:#fff;text-align:center;line-height:42px;border-radius:0 0 60px 60px;font-size:13px;letter-spacing:4px;font-weight:700;margin:0 auto 28px}
.map{display:flex;gap:8px;justify-content:center;align-items:flex-start;margin-bottom:20px}
.sec{display:flex;flex-direction:column;gap:1px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:17px;height:17px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}

/* Color zones */
.seat.premium{background:#e05555;border-color:#c03030;color:#fff}
.seat.premium:hover{background:#c03030}
.seat.midtier{background:#f5a623;border-color:#d4891a;color:#fff}
.seat.midtier:hover{background:#d4891a}
.seat.side{background:#5bc8d4;border-color:#3aa8b4;color:#333}
.seat.side:hover{background:#3aa8b4;color:#fff}

/* Left section rotation */
[data-sec="left"]{transform:rotate(-12deg);transform-origin:top right;}
/* Right section rotation */
[data-sec="right"]{transform:rotate(12deg);transform-origin:top left;}

/* Center curved row effect */
[data-sec="center"] .row{position:relative;}
[data-sec="center"] .sw{border-radius:0 0 40px 40px;padding-bottom:1px;}

.boh{font-size:9px;color:#aaa;text-align:center;margin-top:3px;letter-spacing:.04em;}
</style>
</head>
