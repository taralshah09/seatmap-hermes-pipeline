<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.stage{width:260px;height:34px;background:#1f6feb;color:#fff;text-align:center;line-height:34px;border-radius:6px;font-size:12px;letter-spacing:3px;font-weight:700;margin:0 auto 20px}
.map{display:flex;gap:0px;justify-content:center;align-items:flex-start;margin-bottom:20px;width:100%;max-width:990px}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:18px;height:18px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}

/* Center section seat colors - rows A-D red, E onwards orange */
[data-sec="center"] .row-A .seat,
[data-sec="center"] .row-B .seat,
[data-sec="center"] .row-C .seat,
[data-sec="center"] .row-D .seat{background:#f87171;border-color:#ef4444;color:#fff}
[data-sec="center"] .row-A .seat:hover,
[data-sec="center"] .row-B .seat:hover,
[data-sec="center"] .row-C .seat:hover,
[data-sec="center"] .row-D .seat:hover{background:#dc2626}
[data-sec="center"] .row-E .seat,
[data-sec="center"] .row-F .seat,
[data-sec="center"] .row-G .seat,
[data-sec="center"] .row-H .seat,
[data-sec="center"] .row-J .seat,
[data-sec="center"] .row-K .seat,
[data-sec="center"] .row-L .seat{background:#fb923c;border-color:#ea580c;color:#fff}
[data-sec="center"] .row-E .seat:hover,
[data-sec="center"] .row-F .seat:hover,
[data-sec="center"] .row-G .seat:hover,
[data-sec="center"] .row-H .seat:hover,
[data-sec="center"] .row-J .seat:hover,
[data-sec="center"] .row-K .seat:hover,
[data-sec="center"] .row-L .seat:hover{background:#c2410c}

/* Left section seat colors by seat number position */
[data-sec="left"] .seat{background:#3b82f6;border-color:#1d4ed8;color:#fff}
[data-sec="left"] .seat:hover{background:#1d4ed8}
[data-sec="left"] .seat-orange{background:#fb923c;border-color:#ea580c;color:#fff}
[data-sec="left"] .seat-orange:hover{background:#c2410c}
[data-sec="left"] .seat-red{background:#f87171;border-color:#ef4444;color:#fff}
[data-sec="left"] .seat-red:hover{background:#dc2626}

/* Right section seat colors */
[data-sec="right"] .seat{background:#3b82f6;border-color:#1d4ed8;color:#fff}
[data-sec="right"] .seat:hover{background:#1d4ed8}
[data-sec="right"] .seat-orange{background:#fb923c;border-color:#ea580c;color:#fff}
[data-sec="right"] .seat-orange:hover{background:#c2410c}
[data-sec="right"] .seat-red{background:#f87171;border-color:#ef4444;color:#fff}
[data-sec="right"] .seat-red:hover{background:#dc2626}

/* Side section rotation - reduced to ~9deg angle */
[data-sec="left"]{
  transform: rotate(9deg);
  transform-origin: top right;
  margin-right: -10px;
  position: relative;
  z-index: 1;
  align-items: flex-start;
}
[data-sec="right"]{
  transform: rotate(-9deg);
  transform-origin: top left;
  margin-left: -10px;
  position: relative;
  z-index: 1;
  align-items: flex-end;
}

/* Center section */
[data-sec="center"]{
  position: relative;
  z-index: 2;
}

/* Center section row spacing */
[data-sec="center"] .row+.row{margin-top: 4px;}
</style>
