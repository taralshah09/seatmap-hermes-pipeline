<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }

  /* ── overall layout ── */
  .tier { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; width: 100%; max-width: 1200px; align-items: end; }
  .tier-upper { margin-bottom: 12px; }
  .tier-lower { margin-bottom: 16px; align-items: center; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cell-left  { align-items: flex-end; }
  .cell-right { align-items: flex-start; }
  .cell-center { align-items: center; }

  /* ── sections ── */
  .section { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .section-label { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }

  /* ── rows ── */
  .row { display: flex; align-items: center; gap: 3px; }
  .row-label { font-size: 9px; font-weight: 700; color: #999; width: 16px; text-align: center; flex-shrink: 0; }
  .row-label.hidden { visibility: hidden; }
  .seats { display: flex; gap: 2px; flex-wrap: nowrap; }

  /* ── seats ── */
  .seat { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #bcd;
          background: #e8f4fd; font-size: 7px; cursor: pointer; color: #334;
          display: flex; align-items: center; justify-content: center;
          transition: background 0.12s; flex-shrink: 0; }
  .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .seat.selected { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .seat.wheelchair { background: #fef3c7; border-color: #f59e0b; }
  .seat.companion  { background: #d1fae5; border-color: #10b981; }
  .seat.restricted { background: #fee2e2; border-color: #ef4444; opacity: 0.55; cursor: not-allowed; }

  /* ── seat color zones ── */
  /* Left section: rows 1-3 cyan/blue, rows 4-5 orange, rows 6-7 red, rest cyan */
  #section-left .row[data-row-id="1"] .seat,
  #section-left .row[data-row-id="2"] .seat,
  #section-left .row[data-row-id="3"] .seat { background: #bfefff; border-color: #5bc8e8; }
  #section-left .row[data-row-id="4"] .seat,
  #section-left .row[data-row-id="5"] .seat { background: #ffe0b2; border-color: #f59e0b; }
  #section-left .row[data-row-id="6"] .seat,
  #section-left .row[data-row-id="7"] .seat { background: #ffcccc; border-color: #ef4444; }
  #section-left .row[data-row-id="8"] .seat,
  #section-left .row[data-row-id="9"] .seat,
  #section-left .row[data-row-id="10"] .seat,
  #section-left .row[data-row-id="11"] .seat,
  #section-left .row[data-row-id="12"] .seat,
  #section-left .row[data-row-id="13"] .seat { background: #bfefff; border-color: #5bc8e8; }

  /* Right section color zones */
  #section-right .row .seat[data-seat="16"],
  #section-right .row .seat[data-seat="17"],
  #section-right .row .seat[data-seat="18"],
  #section-right .row .seat[data-seat="19"],
  #section-right .row .seat[data-seat="20"],
  #section-right .row .seat[data-seat="21"],
  #section-right .row .seat[data-seat="22"] { background: #ffcccc; border-color: #ef4444; }
  #section-right .row .seat[data-seat="23"],
  #section-right .row .seat[data-seat="24"],
  #section-right .row .seat[data-seat="25"] { background: #ffe0b2; border-color: #f59e0b; }
  #section-right .row .seat[data-seat="26"],
  #section-right .row .seat[data-seat="27"],
  #section-right .row .seat[data-seat="28"],
  #section-right .row .seat[data-seat="29"],
  #section-right .row .seat[data-seat="30"],
  #section-right .row .seat[data-seat="31"] { background: #bfefff; border-color: #5bc8e8; }

  /* Center section color zones */
  #section-center .row[data-row-id="A"] .seat,
  #section-center .row[data-row-id="B"] .seat,
  #section-center .row[data-row-id="C"] .seat,
  #section-center .row[data-row-id="D"] .seat { background: #ffcccc; border-color: #ef4444; }
  #section-center .row[data-row-id="E"] .seat,
  #section-center .row[data-row-id="F"] .seat,
  #section-center .row[data-row-id="G"] .seat,
  #section-center .row[data-row-id="H"] .seat,
  #section-center .row[data-row-id="J"] .seat,
  #section-center .row[data-row-id="K"] .seat,
  #section-center .row[data-row-id="L"] .seat { background: #ffe0b2; border-color: #f59e0b; }

  /* ── stage ── */
  .stage-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: center; margin-bottom: 24px; }
  .stage { width: 280px; height: 36px; background: #1a1a2e; color: #fff; text-align: center;
           line-height: 36px; border-radius: 6px 6px 0 0; font-size: 12px; letter-spacing: 3px; font-weight: 600; }

  /* ── stage at top ── */
  .stage-top-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: center; margin-bottom: 8px; }
  .stage-top { width: 280px; height: 36px; background: #1a1a2e; color: #fff; text-align: center;
               line-height: 36px; border-radius: 6px 6px 0 0; font-size: 12px; letter-spacing: 3px; font-weight: 600; }

  /* ── center section arc simulation ── */
  #section-center .row { position: relative; }
  #section-center .row[data-row-id="A"] { margin-left: 0px; margin-right: 0px; }
  #section-center .row[data-row-id="B"] { margin-left: 2px; margin-right: 2px; }
  #section-center .row[data-row-id="C"] { margin-left: 0px; margin-right: 0px; }
  #section-center .row[data-row-id="D"] { margin-left: -4px; margin-right: -4px; }
  #section-center .row[data-row-id="E"] { margin-left: -4px; margin-right: -4px; }
  #section-center .row[data-row-id="F"] { margin-left: -6px; margin-right: -6px; }
  #section-center .row[data-row-id="G"] { margin-left: -6px; margin-right: -6px; }
  #section-center .row[data-row-id="H"] { margin-left: -8px; margin-right: -8px; }
  #section-center .row[data-row-id="J"] { margin-left: -6px; margin-right: -6px; }
  #section-center .row[data-row-id="K"] { margin-left: -6px; margin-right: -6px; }
  #section-center .row[data-row-id="L"] { margin-left: 10px; margin-right: 10px; }

  /* ── back of house labels ── */
  .back-label { font-size: 10px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

  /* ── legend ── */
  #legend { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; flex-shrink: 0; }
</style>
</head>
