<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }

  /* ── overall layout ── */
  .tier { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; width: 100%; max-width: 1200px; align-items: end; }
  .tier-upper { margin-bottom: 12px; }
  .tier-lower { margin-bottom: 16px; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cell-left  { align-items: flex-end; }
  .cell-right { align-items: flex-start; }
  .cell-center { align-items: center; }

  /* ── sections ── */
  .section { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .section-label { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }

  /* ── rows ── */
  .row { display: flex; align-items: center; gap: 3px; }
  .row-label { font-size: 9px; font-weight: 700; color: #999; width: 16px; text-align: center; flex-shrink: 0; }
  .seats { display: flex; gap: 2px; flex-wrap: nowrap; }

  /* ── seats ── */
  .seat { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #bcd;
          background: #e8f4fd; font-size: 7px; cursor: pointer; color: #334;
          display: flex; align-items: center; justify-content: center;
          transition: background 0.12s; flex-shrink: 0; }
  .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .seat.selected { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .seat.wheelchair { background: #fef3c7; border-color: #f59e0b; }
  .seat.companion  { background: #d1fae5; border-color: #10b981; }
  .seat.restricted { background: #fee2e2; border-color: #ef4444; opacity: 0.55; cursor: not-allowed; }

  /* ── stage ── */
  .stage-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: center; margin-bottom: 24px; }
  .stage-wrap.stage-top { margin-bottom: 0; margin-top: 0; order: -1; }
  .stage { width: 280px; height: 36px; background: #1a1a2e; color: #fff; text-align: center;
           line-height: 36px; font-size: 12px; letter-spacing: 3px; font-weight: 600; }
  .stage-wrap.stage-bottom .stage { border-radius: 6px 6px 0 0; }
  .stage-wrap.stage-top    .stage { border-radius: 0 0 20px 20px; margin-bottom: 24px; }

  /* ── center section color tiers ── */
  #section-center .row[data-row-id="A"] .seat,
  #section-center .row[data-row-id="B"] .seat,
  #section-center .row[data-row-id="C"] .seat,
  #section-center .row[data-row-id="D"] .seat {
    background: #e8a0a0; border-color: #c05555; color: #5a0000;
  }
  #section-center .row[data-row-id="E"] .seat,
  #section-center .row[data-row-id="F"] .seat,
  #section-center .row[data-row-id="G"] .seat,
  #section-center .row[data-row-id="H"] .seat,
  #section-center .row[data-row-id="J"] .seat,
  #section-center .row[data-row-id="K"] .seat,
  #section-center .row[data-row-id="L"] .seat {
    background: #f5c97a; border-color: #c07820; color: #4a2e00;
  }
  #section-center .row[data-row-id="A"] .seat:hover,
  #section-center .row[data-row-id="B"] .seat:hover,
  #section-center .row[data-row-id="C"] .seat:hover,
  #section-center .row[data-row-id="D"] .seat:hover,
  #section-center .row[data-row-id="E"] .seat:hover,
  #section-center .row[data-row-id="F"] .seat:hover,
  #section-center .row[data-row-id="G"] .seat:hover,
  #section-center .row[data-row-id="H"] .seat:hover,
  #section-center .row[data-row-id="J"] .seat:hover,
  #section-center .row[data-row-id="K"] .seat:hover,
  #section-center .row[data-row-id="L"] .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  /* ── center arc: rows get subtle translateY offsets applied inline ── */
  #section-center { gap: 2px; }

  /* ── left section color coding ── */
  #section-left .row[data-row-id="1"] .seat,
  #section-left .row[data-row-id="2"] .seat { background: #5bc8e8; border-color: #1a8aaa; color: #00303f; }
  #section-left .row[data-row-id="3"] .seat,
  #section-left .row[data-row-id="4"] .seat { background: #5bc8e8; border-color: #1a8aaa; color: #00303f; }
  #section-left .row[data-row-id="5"] .seat,

  #section-left .row[data-row-id="7"] .seat,
  #section-left .row[data-row-id="8"] .seat,
  #section-left .row[data-row-id="9"] .seat { background: #f5c97a; border-color: #c07820; color: #4a2e00; }
  #section-left .row[data-row-id="10"] .seat,

  #section-left .row[data-row-id="12"] .seat,
  #section-left .row[data-row-id="13"] .seat { background: #e8a0a0; border-color: #c05555; color: #5a0000; }

  #section-left .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  /* ── right section color coding (mirror of left) ── */
  #section-right .row[data-row-id="1"] .seat,

  #section-right .row[data-row-id="5"] .seat,
  #section-right .row[data-row-id="6"] .seat,
  #section-right .row[data-row-id="7"] .seat,
  #section-right .row[data-row-id="8"] .seat,
  #section-right .row[data-row-id="9"] .seat { background: #f5c97a; border-color: #c07820; color: #4a2e00; }
  #section-right .row[data-row-id="10"] .seat,
  #section-right .row[data-row-id="11"] .seat,
  #section-right .row[data-row-id="12"] .seat,
  #section-right .row[data-row-id="13"] .seat { background: #e8a0a0; border-color: #c05555; color: #5a0000; }

  #section-right .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  /* ── legend ── */
  #legend { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; flex-shrink: 0; }

  /* ── back of house label ── */
  .boh-label { font-size: 9px; font-weight: 700; color: #aaa; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
</style>
</head>
