<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.stage{width:320px;height:40px;background:#1f6feb;color:#fff;text-align:center;line-height:40px;border-radius:6px;font-size:13px;letter-spacing:3px;font-weight:700;margin:0 auto 24px}
.map{display:flex;gap:12px;justify-content:center;align-items:flex-start;margin-bottom:20px;min-height:320px}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:2px}
.rl{font-size:8px;font-weight:700;color:#999;width:11px;text-align:center;flex-shrink:0}
.sw{display:flex;gap:2px}
.seat{width:15px;height:15px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:6px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.wheelchair{background:#fef3c7;border-color:#f59e0b}
.seat.companion{background:#d1fae5;border-color:#10b981}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}

/* Side section seats colored teal/blue */
[data-sec="left"] .seat, [data-sec="right"] .seat {background:#cffafe;border-color:#06b6d4;}
[data-sec="left"] .seat:hover, [data-sec="right"] .seat:hover {background:#0891b2;color:#fff;}

/* Center front rows A-D pink/red (rows 2-5 accounting for label row), rows E-L orange */
[data-sec="center"] .row:nth-child(-n+5) .seat {background:#fce7f3;border-color:#ec4899;}
[data-sec="center"] .row:nth-child(n+6) .seat {background:#ffedd5;border-color:#f97316;}

/* Left section rotated -15deg counter-clockwise, origin top-right */
[data-sec="left"]{transform:rotate(-15deg);transform-origin:top right;}

/* Right section rotated +15deg clockwise, origin top-left */
[data-sec="right"]{transform:rotate(15deg);transform-origin:top left;}

/* Center rows arc/fan simulation: each row gets slightly wider via padding */
[data-sec="center"] .sw {border-radius:0 0 10px 10px;padding-bottom:1px;}

/* BOH labels */
.boh{font-size:8px;color:#aaa;text-align:center;margin-top:3px;letter-spacing:.05em;font-style:italic;}
</style>
</head>
