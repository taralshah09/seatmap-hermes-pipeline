<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.stage{width:260px;height:34px;background:#1f6feb;color:#fff;text-align:center;line-height:34px;border-radius:6px;font-size:12px;letter-spacing:3px;font-weight:700;margin:0 auto 20px}
.map{display:flex;gap:14px;justify-content:center;align-items:flex-start;margin-bottom:20px}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:18px;height:18px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.wheelchair{background:#fef3c7;border-color:#f59e0b}
.seat.companion{background:#d1fae5;border-color:#10b981}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}

/* Side section seats colored teal/blue */
[data-sec="left"] .seat, [data-sec="right"] .seat {background:#cffafe;border-color:#06b6d4;}
[data-sec="left"] .seat:hover, [data-sec="right"] .seat:hover {background:#0891b2;color:#fff;}

/* Center front rows pink/red, middle rows orange */
[data-sec="center"] .row:nth-child(-n+5) .seat {background:#fce7f3;border-color:#ec4899;}
[data-sec="center"] .row:nth-child(n+6) .seat {background:#ffedd5;border-color:#f97316;}

/* Left section rotated clockwise ~17deg */
[data-sec="left"]{transform:rotate(17deg);transform-origin:bottom center;}

/* Right section rotated counter-clockwise ~17deg */
[data-sec="right"]{transform:rotate(-17deg);transform-origin:bottom center;}

/* Center rows curved appearance */
[data-sec="center"] .sw {border-radius:0 0 12px 12px;padding-bottom:1px;}
</style>
<style id="orient-style">
.map{position:relative;display:block;width:1360px;height:960px;margin:0 auto 20px;flex-wrap:nowrap;}
.map [data-sec]{position:absolute;}
.map .stage{margin:0;}
[data-sec="stage"]{left:50.00%;top:4.00%;transform:translate(-50%,-50%) scale(1);}
[data-sec="center"]{left:50.00%;top:38.00%;transform:translate(-50%,-50%) scale(1);}
[data-sec="left"]{left:15.00%;top:50.00%;transform:translate(-50%,-50%) scale(0.8);}
[data-sec="right"]{left:85.00%;top:50.00%;transform:translate(-50%,-50%) scale(0.8);}
</style>
</head>
