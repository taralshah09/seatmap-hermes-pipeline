<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.stage{width:320px;height:38px;background:#1f6feb;color:#fff;text-align:center;line-height:38px;border-radius:0 0 60% 60% / 0 0 30px 30px;font-size:12px;letter-spacing:3px;font-weight:700;margin:0 auto 28px}
.map{display:flex;gap:4px;justify-content:center;align-items:flex-start;margin-bottom:20px;position:relative}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:18px;height:18px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}

/* Color tiers */
.seat.premium{background:#ffd6d6;border-color:#e05555;}
.seat.premium:hover{background:#e05555;color:#fff;}
.seat.mid{background:#ffe8cc;border-color:#e07820;}
.seat.mid:hover{background:#e07820;color:#fff;}
.seat.standard{background:#cce8ff;border-color:#3b82f6;}
.seat.standard:hover{background:#3b82f6;color:#fff;}

/* Left section rotated counter-clockwise ~20deg, anchored top-right */
.sec[data-sec="left"]{
  transform: rotate(-20deg);
  transform-origin: top right;
  margin-right: -10px;
}

/* Right section rotated clockwise ~20deg, anchored top-left */
.sec[data-sec="right"]{
  transform: rotate(20deg);
  transform-origin: top left;
  margin-left: -10px;
}

/* Center section rows curved toward stage using border-radius on sw */
.sec[data-sec="center"] .sw{
  position:relative;
}
.sec[data-sec="center"] .row{
  justify-content:center;
}
/* Arc effect: each row bows slightly upward toward stage via margin adjustments */
.sec[data-sec="center"] .row:nth-child(2) .sw{ margin-top: 0px; border-radius: 50% 50% 0 0 / 8px 8px 0 0; }
.sec[data-sec="center"] .row:nth-child(3) .sw{ margin-top: 1px; }
.sec[data-sec="center"] .row:nth-child(4) .sw{ margin-top: 1px; }
.sec[data-sec="center"] .row:nth-child(5) .sw{ margin-top: 2px; }
.sec[data-sec="center"] .row:nth-child(6) .sw{ margin-top: 2px; }
.sec[data-sec="center"] .row:nth-child(7) .sw{ margin-top: 2px; }
.sec[data-sec="center"] .row:nth-child(8) .sw{ margin-top: 3px; }
.sec[data-sec="center"] .row:nth-child(9) .sw{ margin-top: 3px; }
.sec[data-sec="center"] .row:nth-child(10) .sw{ margin-top: 3px; }
.sec[data-sec="center"] .row:nth-child(11) .sw{ margin-top: 4px; }
.sec[data-sec="center"] .row:nth-child(12) .sw{ margin-top: 4px; }
</style>
</head>
