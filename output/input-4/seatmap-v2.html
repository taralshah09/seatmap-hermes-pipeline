<!DOCTYPE html>

<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:16px 8px}
.fire-exit-row{display:flex;justify-content:space-between;width:100%;max-width:1100px;margin-bottom:4px}
.fire-exit{font-size:9px;font-weight:700;color:#dc2626;background:#fee2e2;border:1px solid #dc2626;padding:2px 6px;border-radius:3px}
.stage{width:260px;height:34px;background:#1f6feb;color:#fff;text-align:center;line-height:34px;border-radius:6px;font-size:12px;letter-spacing:3px;font-weight:700;margin:0 auto 8px}
.main-floor-label{font-size:11px;font-weight:700;color:#333;text-align:center;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.map{display:flex;gap:6px;justify-content:center;align-items:flex-start;margin-bottom:8px;flex-wrap:nowrap}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:9px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;text-align:center}
.row{display:flex;align-items:center;gap:2px}
.rl{font-size:8px;font-weight:700;color:#999;width:13px;text-align:center;flex-shrink:0}
.sw{display:flex;gap:1px}
.seat{width:16px;height:16px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:6px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s;padding:0;line-height:1}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.wheelchair{background:#fef3c7;border-color:#f59e0b;font-size:9px}
.seat.companion{background:#d1fae5;border-color:#10b981}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}
.seat.center-label{background:#dbeafe;border-color:#93c5fd;font-size:8px;font-weight:700;color:#1e40af;width:16px}
[data-sec="left-risers"]{transform:skewY(-5deg);transform-origin:top right}
[data-sec="right-risers"]{transform:skewY(5deg);transform-origin:top left}
.lobby-row{display:flex;justify-content:center;width:100%;margin-top:8px}
.lobby{font-size:10px;font-weight:700;color:#555;background:#e2e8f0;border:1px solid #94a3b8;padding:3px 16px;border-radius:4px;text-align:center}
.wc-note{font-size:8px;color:#92400e;margin-left:3px;display:inline-block}
</style>
</head>
