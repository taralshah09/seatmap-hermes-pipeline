<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.venue-wrapper{position:relative;width:820px;min-height:680px;margin-bottom:16px}
.exit-label{position:absolute;top:50%;font-size:10px;font-weight:700;color:#888;letter-spacing:.1em;writing-mode:vertical-rl;text-orientation:mixed}
.exit-left{left:0;transform:translateY(-50%)}
.exit-right{right:0;transform:translateY(-50%) rotate(180deg)}
.lobby-label{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#555;letter-spacing:.12em;text-transform:uppercase}
.elevator-label{position:absolute;top:4px;right:52px;font-size:10px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase}
.balcony-box-left{position:absolute;top:20px;left:22px;border:2px solid #555;border-radius:12px;padding:8px 6px;background:#fff;transform:rotate(-8deg);transform-origin:bottom right;z-index:10}
.balcony-box-right{position:absolute;top:20px;right:22px;border:2px solid #555;border-radius:12px;padding:8px 6px;background:#fff;transform:rotate(8deg);transform-origin:bottom left;z-index:10}
.balcony-title{font-size:9px;font-weight:700;color:#555;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.map{display:flex;gap:6px;justify-content:center;align-items:flex-end;margin-bottom:0;padding-top:160px}
.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:18px;height:18px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.wheelchair{background:#fef3c7;border-color:#f59e0b;font-size:10px}
.seat.companion{background:#d1fae5;border-color:#10b981}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}
.seat.aisle{width:12px;height:18px;background:#e5e7eb;border-color:#9ca3af;color:#9ca3af;font-size:6px;border-radius:2px;cursor:default}
.seat.special-aisle{background:#dbeafe;border-color:#3b82f6;font-weight:700}
.sec-left-orch{transform:rotate(-12deg) skewY(-3deg);transform-origin:bottom right;margin-right:-10px}
.sec-right-orch{transform:rotate(12deg) skewY(3deg);transform-origin:bottom left;margin-left:-10px}
.stage{width:280px;height:36px;background:#1f6feb;color:#fff;text-align:center;line-height:36px;border-radius:8px 8px 4px 4px;font-size:12px;letter-spacing:3px;font-weight:700;margin:18px auto 0;position:relative}
.stage::before{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:320px;height:8px;background:#1f6feb;opacity:.3;border-radius:0 0 40px 40px}
</style>
</head>
