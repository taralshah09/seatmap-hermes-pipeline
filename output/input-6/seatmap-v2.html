<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }

  /* ── overall layout ── */
  .tier { display: grid; grid-template-columns: auto 60px auto; gap: 0px; width: 100%; max-width: 1400px; align-items: start; }
  .tier-upper { margin-bottom: 12px; }
  .tier-lower { margin-bottom: 16px; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cell-left  { align-items: flex-end; }
  .cell-right { align-items: flex-start; }
  .cell-center { align-items: center; justify-content: flex-start; }

  /* ── sections ── */
  .section { display: flex; flex-direction: column; align-items: center; gap: 1px; margin-bottom: 6px; }
  .section-label { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }

  /* ── Q Manager divider ── */
  .q-manager-divider {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 4px 8px; margin: 4px 0;
    background: #fff3cd; border: 1px dashed #f0ad4e;
    font-size: 9px; font-weight: 700; color: #856404;
    letter-spacing: 0.04em; white-space: nowrap;
  }

  /* ── rows ── */
  .row { display: flex; align-items: center; gap: 2px; }
  .row-label { font-size: 9px; font-weight: 700; color: #999; width: 16px; text-align: center; flex-shrink: 0; }
  .seats { display: flex; gap: 1px; flex-wrap: nowrap; }

  /* ── seats ── */
  .seat { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #bcd;
          background: #e8f4fd; font-size: 7px; cursor: pointer; color: #334;
          display: flex; align-items: center; justify-content: center;
          transition: background 0.12s; flex-shrink: 0; }
  .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .seat.selected { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .seat.wheelchair { background: #fef3c7; border-color: #f59e0b; }
  .seat.companion  { background: #d1fae5; border-color: #10b981; }
  .seat.restricted { background: #fee2e2; border-color: #ef4444; opacity: 0.55; cursor: not-allowed; }

  /* ── stage ── */
  .stage-wrap { width: 100%; max-width: 1400px; display: flex; justify-content: center; margin-bottom: 8px; }
  .stage-wrap.stage-top { margin-bottom: 0; margin-top: 0; order: -1; }
  .stage { width: 320px; height: 36px; background: #1a1a2e; color: #fff; text-align: center;
           line-height: 36px; font-size: 12px; letter-spacing: 3px; font-weight: 600; }
  .stage-wrap.stage-bottom .stage { border-radius: 6px 6px 0 0; }
  .stage-wrap.stage-top    .stage { border-radius: 0 0 6px 6px; margin-bottom: 12px; }

  /* ── center ramp ── */
  .ramp-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: #c0392b;
    min-height: 600px;
    width: 60px;
    padding: 8px 2px;
    position: relative;
  }
  .ramp-label {
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-top: 8px;
  }
  .ramp-size-label {
    color: #ffd;
    font-size: 8px;
    font-weight: 600;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    letter-spacing: 0.03em;
    white-space: nowrap;
    margin-top: 6px;
  }

  /* ── section letter labels beside ramp ── */
  .section-letters {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin-top: 2px;
  }
  .section-letter-badge {
    font-size: 11px;
    font-weight: 900;
    color: #fff;
    background: rgba(0,0,0,0.25);
    border-radius: 3px;
    padding: 1px 3px;
    min-width: 20px;
    text-align: center;
  }

  /* ── zone total label ── */
  .zone-total {
    font-size: 10px; font-weight: 700; color: #555;
    text-align: center; margin-top: 4px; padding: 2px 6px;
    background: #e2e8f0; border-radius: 4px;
  }

  /* ── legend ── */
  #legend { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; flex-shrink: 0; }
</style>
</head>
