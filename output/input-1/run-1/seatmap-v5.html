<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .theater-wrapper { display: flex; flex-direction: column; align-items: center; width: 1200px; }
  .stage { width: 300px; height: 40px; background: #222; color: #fff; text-align: center;
           line-height: 40px; border-radius: 4px; margin: 16px auto 0; font-size: 13px; letter-spacing: 2px; }
  .theater-container { position: relative; width: 1200px; margin: 0 auto; }
  .lobby-label { font-size: 12px; font-weight: 700; color: #888; letter-spacing: 3px; text-transform: uppercase; }
  .section { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .section-label { font-size: 10px; font-weight: 600; color: #555; margin-bottom: 4px; text-transform: uppercase; text-align: center; }
  .row { display: flex; align-items: center; gap: 3px; }
  .row-label { font-size: 9px; font-weight: 600; color: #888; width: 16px; text-align: center; flex-shrink: 0; }
  .seats { display: flex; gap: 2px; }
  .seat { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #ccc;
          background: #e8f4fd; font-size: 7px; cursor: pointer; color: #333;
          display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .seat:hover { background: #3b82f6; color: #fff; }
  .seat.selected { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .seat.wheelchair { width: 22px; height: 22px; border-radius: 5px; background: #fef3c7; border-color: #f59e0b; font-size: 10px; }
  .seat.companion { background: #d1fae5; border-color: #10b981; }
  .seat.restricted { background: #fee2e2; border-color: #ef4444; opacity: 0.6; cursor: not-allowed; }
  .seat.unavailable { background: #e5e7eb; border-color: #9ca3af; color: #9ca3af; cursor: default; opacity: 0.5; }
  .balcony-box { border: 2px solid #cbd5e1; border-radius: 16px; padding: 8px; background: #f8fafc; }
  .balcony-label { font-size: 9px; font-weight: 700; color: #64748b; text-align: center; margin-bottom: 4px; text-transform: uppercase; }
  .exit-label { font-size: 10px; font-weight: 700; color: #ef4444; letter-spacing: 2px; }
  .elevator-label { font-size: 10px; font-weight: 700; color: #3b82f6; letter-spacing: 1px; }
  #legend { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; }
  .nav-bar { display: flex; justify-content: space-between; align-items: center; width: 1180px; margin-bottom: 4px; padding: 0 10px; }
  .upper-area { display: flex; justify-content: center; align-items: flex-start; gap: 16px; margin-bottom: 0; }
  .lobby-gap { height: 36px; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
  .orchestra-area { display: flex; gap: 6px; justify-content: center; align-items: flex-end; margin-bottom: 0; }
  .section-left-orch { display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    transform: rotate(15deg); transform-origin: bottom center; margin-right: -10px; }
  .section-right-orch { display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    transform: rotate(-15deg); transform-origin: bottom center; margin-left: -10px; }
  .section-center-orch { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .section-center-mezz { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .left-balcony-wrapper { transform: rotate(5deg); transform-origin: bottom right; }
  .right-balcony-wrapper { transform: rotate(-5deg); transform-origin: bottom left; }
  .wheelchair-area { display: flex; gap: 2px; align-items: center; }
  .wheelchair-label { font-size: 8px; color: #92400e; font-weight: 700; }
  .wc-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .wc-row { display: flex; gap: 2px; }
</style>
