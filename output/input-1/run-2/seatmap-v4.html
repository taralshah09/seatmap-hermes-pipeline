<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }

  .venue-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }

  .tier { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; width: 100%; max-width: 1200px; align-items: end; }
  .tier-upper { margin-bottom: 4px; }
  .tier-lower { margin-bottom: 16px; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cell-left  { align-items: flex-end; }
  .cell-right { align-items: flex-start; }
  .cell-center { align-items: center; }

  .section { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .section-label { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }

  .row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
  .row-label { font-size: 9px; font-weight: 700; color: #999; width: 16px; text-align: center; flex-shrink: 0; }
  .seats { display: flex; gap: 2px; flex-wrap: nowrap; }

  .seat { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #bcd;
          background: #e8f4fd; font-size: 7px; cursor: pointer; color: #334;
          display: flex; align-items: center; justify-content: center;
          transition: background 0.12s; flex-shrink: 0; }
  .seat:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .seat.selected { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .seat.wheelchair { background: #fef3c7; border-color: #f59e0b; font-size: 10px; }
  .seat.companion  { background: #d1fae5; border-color: #10b981; }
  .seat.restricted { background: #fee2e2; border-color: #ef4444; opacity: 0.55; cursor: not-allowed; }
  .seat.u-seat { background: #e2e8f0; border-color: #94a3b8; color: #64748b; font-size: 6px; width: 14px; height: 14px; }

  .stage-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: center; margin-bottom: 24px; }
  .stage { width: 320px; height: 40px; background: #1a1a2e; color: #fff; text-align: center;
           line-height: 40px; border-radius: 50% 50% 0 0 / 20px 20px 0 0; font-size: 13px; letter-spacing: 3px; font-weight: 600; }

  #legend { display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; flex-shrink: 0; }

  .orchestra-layout {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    max-width: 1200px;
    margin-bottom: 16px;
    position: relative;
    min-height: 320px;
  }

  #section-left {
    transform: rotate(-22deg);
    transform-origin: center bottom;
    margin-right: -20px;
    align-self: flex-end;
  }
  #section-right {
    transform: rotate(22deg);
    transform-origin: center bottom;
    margin-left: -20px;
    align-self: flex-end;
  }
  #section-center {
    align-self: flex-end;
    margin-bottom: 0;
  }

  .exit-label {
    font-size: 9px;
    font-weight: 800;
    color: #c00;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    align-self: center;
    margin: 0 4px;
    border: 1px solid #c00;
    padding: 4px 2px;
    border-radius: 2px;
  }

  .lobby-label {
    font-size: 10px;
    font-weight: 700;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }
  .elevator-label {
    font-size: 9px;
    font-weight: 700;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2px;
  }

  .top-bar {
    width: 100%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 4px;
  }
  .top-bar-center { flex: 1; text-align: center; }
  .top-bar-right { text-align: right; padding-right: 20px; }
  .top-bar-left { padding-left: 20px; }
</style>
</head>
