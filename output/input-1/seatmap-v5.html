<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seatmap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;padding:24px 16px}

.venue-labels{width:100%;max-width:960px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 8px}
.venue-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase}

.balcony-tier{display:flex;gap:10px;justify-content:center;margin-bottom:8px;width:100%;max-width:960px}
.balcony-box{border:2px solid #a0aec0;border-radius:8px;padding:6px 8px;background:#f0f4f8;}
.balcony-box .sl{font-size:9px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;text-align:center}

.orchestra-tier{display:flex;gap:0px;justify-content:center;align-items:flex-start;margin-bottom:8px;width:100%;max-width:960px}

.sec{display:flex;flex-direction:column;gap:2px;align-items:center}
.sl{font-size:10px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.row{display:flex;align-items:center;gap:3px}
.rl{font-size:9px;font-weight:700;color:#999;width:15px;text-align:center}
.sw{display:flex;gap:2px}
.seat{width:18px;height:18px;border-radius:3px;border:1px solid #ccc;background:#e8f4fd;font-size:7px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;transition:background .12s}
.seat:hover{background:#3b82f6;color:#fff}
.seat.selected{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.seat.wheelchair{background:#fef3c7;border-color:#f59e0b}
.seat.companion{background:#d1fae5;border-color:#10b981}
.seat.restricted{background:#fee2e2;border-color:#ef4444;opacity:.55;cursor:not-allowed}
.seat.utility{background:#e5e7eb;border-color:#9ca3af;color:#6b7280;font-size:6px}

.orch-left{transform-origin:right center;transform:perspective(800px) rotate(-15deg);margin-right:-4px}
.orch-right{transform-origin:left center;transform:perspective(800px) rotate(15deg);margin-left:-4px}
.orch-center{z-index:2;position:relative}
.orch-center .sec{clip-path:polygon(4% 0%,96% 0%,100% 100%,0% 100%)}

.stage-wrap{width:100%;max-width:960px;display:flex;justify-content:center;margin-top:4px}
.stage{width:280px;height:38px;background:#1f6feb;color:#fff;text-align:center;line-height:38px;border-radius:0 0 60px 60px / 0 0 22px 22px;font-size:12px;letter-spacing:3px;font-weight:700;margin:0 auto;box-shadow:0 4px 12px #1f6feb55}

.exit-labels{width:100%;max-width:960px;display:flex;justify-content:space-between;margin-top:6px;padding:0 8px}
.exit-label{font-size:10px;font-weight:700;color:#e53e3e;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
